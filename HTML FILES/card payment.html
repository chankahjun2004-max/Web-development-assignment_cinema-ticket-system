<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Payment</title>

    <link rel="stylesheet" href="../CSS FILES/cardpayment.css">
    <script defer src="../JS FILES/cardpayment.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="../IMAGES/card_img.png" type="image/x-icon">
</head>


<body>

        
<div class="payment-form">
<form id="form"> 
    <div class="row">

    <div class="col">
        <h3 class="title">Payment</h3>
                <span>Card Accepted : </span>
            <img src="../IMAGES/card_img.png" alt="Cards that can be accepted">
            <div class="InputBox">
                <label for="nameCard">Name on Card : </label>
                <input type="text" id="nameCard" placeholder="Alex" >
                <span id="namecard-error"></span>
            </div>

            <div class="InputBox">
                <label for="cardNum">Card Number : </label>
                <input type="text" id="cardNum" placeholder="XXXXXXXXXXXXXXXX">
                <span id="cardnum-error"></span>
            </div>

            <div class="InputBox">
                <span>Expiry date : </span>
                <input type="month" placeholder="   MM/YYYY" >
            </div>

            <div class="InputBox">
                <label for="cvv">Securtiy Code : </span>
                <input type="text" id="cvv" placeholder="000" >
                <span id="cvv-error"></span>
                </div>

        </div>
            
    </div>
        <div class="button">
            <button id="payNowBtn" onclick="payNow()">Pay Now</button>
        </div>
</form>
</div>

</body>
</html>
