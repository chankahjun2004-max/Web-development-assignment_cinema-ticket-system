<!DOCTYPE html>
<html>
    <head>
        <title>Online Banking</title>
<link rel="stylesheet" href="../CSS FILES/onlinebank.css">
<link rel="icon" href="favicon.ico" type="image/x-icon">
    </head>
    <body>
        <div class="container">
            <img src="../IMAGES/onlinebanking.png">
            <h2>Login to your Bank</h2>
            <form id="bankLoginForm">
                <p>Select a bank</p>
                <select id="banks" name="banks" required onchange="enableInputFields()">
                    <option value="">-- Please select --</option>
                    <option value="Maybank2u">Maybank2u</option>
                    <option value="CIMB Clicks">CIMB Clicks</option>
                    <option value="Public Bank">Public Bank</option>
                    <option value="Hong Leong Bank">Hong Leong Bank</option>
                    <option value="RHB Now">RHB Now</option>
                    <option value="Ambank">Ambank</option>
                    <option value="Bank Islam">Bank Islam</option>
                </select>
                <div class="input-group">
                    <p>Username:</p>
                    <input type="text" id="username" name="username" class="onlinebankname" placeholder="Username" disabled>
                </div>
                <div class="input-group">
                    <p>Password:</p>
                    <input type="password" id="password" name="password" class="onlinebankpw" placeholder="Password" disabled>
                </div>
                <button id="loginButton">Login</button>
            </form>
        </div>
        <script src="../JS FILES/onlinebank.js"></script>
    </body>
</html>
