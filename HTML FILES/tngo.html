<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tngo Ewallet</title>
        <link rel="stylesheet" href="../CSS FILES/tngo.css">
    </head>
    <body>
        <div class="login-container">
            <img src="../IMAGES/tngo.png" alt="Logo">
            <form id="loginForm">
                <label for="phone">Phone Number:</label>
                <input type="text" id="phone" class="tngphone" placeholder="Phone Number" maxlength="11" required>
                <label for="password">Password:</label>
                <input type="password" id="password" class="tngpw" placeholder="Password" required>
                <input type="submit" value="Login" disabled>
            </form>
        </div>
        <script src="../JS FILES/tngo.js"></script>
    </body>
</html>
